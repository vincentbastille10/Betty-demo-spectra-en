<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Betty Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }

    body {
      background: #0b0f1e;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    .chat {
      width: 400px;
      background: #111827;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .avatar-wrap img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    .messages {
      height: 260px;
      overflow-y: auto;
      margin-bottom: 10px;
      padding-right: 4px;
    }

    .msg {
      margin: 8px 0;
      line-height: 1.5;
      font-size: 15px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .msg a {
      display: inline-block;
      margin-top: 4px;
      color: #a78bfa;
      text-decoration: underline;
    }

    .user { text-align: right; color: #ffffff; }
    .bot  { text-align: left;  color: #a78bfa; }

    .footer { display: flex; gap: 5px; }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 15px;
      outline: none;
    }

    button {
      padding: 10px 18px;
      border: none;
      background: #7b61ff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled { background: #4b5563; cursor: not-allowed; }

    .status {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 6px;
      min-height: 16px;
    }

    @media (max-width: 768px) {
      body { padding: 10px; }
      .chat { width: 100%; }
      .avatar-wrap img { width: 120px; height: 120px; }
      .messages { height: 220px; }
      .msg { font-size: 14px; }
    }
  </style>
</head>

<body>
  <div class="chat">
    <div class="avatar-wrap">
      <img src="{{ url_for('static', filename='neutre_femme.webp') }}" alt="Betty" />
    </div>

    <div id="messages" class="messages">
      <div class="msg bot">Hi 🙂 What kind of business are you in?</div>
    </div>

    <div class="footer">
      <input id="input" placeholder="Write your message…" autocomplete="off" />
      <button id="send" type="button">Send</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script>
    const history = [];

    function formatMessage(text) {
      const escaped = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
      return escaped.replace(/(https?:\/\/[^\s<]+)/g, url => {
        const clean = url.replace(/[>.,)&]+$/, "");
        return `<a href="${clean}" target="_blank" rel="noopener">${clean}</a>`;
      });
    }

    async function send() {
      const input    = document.getElementById("input");
      const messages = document.getElementById("messages");
      const status   = document.getElementById("status");
      const btn      = document.getElementById("send");

      const message = input.value.trim();
      if (!message) return;

      messages.innerHTML += `<div class="msg user">${formatMessage(message)}</div>`;
      input.value = "";
      input.disabled = true;
      btn.disabled   = true;
      status.textContent = "Betty is thinking…";
      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, history })
        });

        const raw = await res.text();
        let data;
        try { data = JSON.parse(raw); }
        catch { throw new Error("Non-JSON response: " + raw); }

        if (!res.ok) throw new Error(data.error || data.detail || "Server error " + res.status);

        const reply = data.response || "";
        history.push({ role: "user",      content: message });
        history.push({ role: "assistant", content: reply   });

        messages.innerHTML += `<div class="msg bot">${formatMessage(reply)}</div>`;
        status.textContent = data.lead_captured ? "✅ Your details have been sent." : "";

      } catch (e) {
        console.error("Chat error:", e);
        messages.innerHTML += `<div class="msg bot">Small technical hiccup — please try again 🙂</div>`;
        status.textContent = String(e.message || e);
      }

      input.disabled = false;
      btn.disabled   = false;
      input.focus();
      messages.scrollTop = messages.scrollHeight;
    }

    document.getElementById("send").addEventListener("click", send);
    document.getElementById("input").addEventListener("keydown", e => {
      if (e.key === "Enter") send();
    });
  </script>
</body>
</html>
